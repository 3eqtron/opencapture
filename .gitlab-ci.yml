services:
  - postgres:latest

variables:
  POSTGRES_DB: "MaarchCourrier"
  POSTGRES_USER: maarch
  POSTGRES_PASSWORD: ""

stages:
  - test

before_script:
  - apt-get update > /dev/null
  - apt-get install apt-utils -yqq > /dev/null
  - bash ci/docker_install_mail_server.sh > /dev/null
  - bash ci/send_simple_mail.sh > /dev/null
  - bash ci/docker_install_php.sh > /dev/null
  - bash ci/test_imap.sh > /dev/null

job_php-7.0:
  image: php:7.0-apache
  stage: test
  script:
    - mkdir -p /var/www/html/
    - cp -R /builds/maarch/MaarchCapture/ /var/www/html/
    - mkdir -p /opt/maarch/docservers/indexes/{letterbox_coll,attachments_coll,version_attachments_coll}
  only:
    - develop
